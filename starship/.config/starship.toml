# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

add_newline = false

[directory]
style = "green"
truncation_length = 1
#truncation_symbol = ".../"
fish_style_pwd_dir_length = 1

[character]
success_symbol = '[\$](green)' # "[‚ĚĮ](green)"
error_symbol = '[\$](red)'     # "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
show_milliseconds = true
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
